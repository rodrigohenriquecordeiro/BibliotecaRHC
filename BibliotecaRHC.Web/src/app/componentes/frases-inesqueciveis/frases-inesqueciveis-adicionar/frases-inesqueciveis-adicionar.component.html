<div class="container my-4">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">

      <h2 class="fw-normal bg-secondary mb-3 text-center"><strong>Adicionar Nova Frase</strong></h2>
      <hr class="mb-4">

      <form [formGroup]="form">

        <div class="mb-3">
          <label for="frase" class="form-label w-100"><strong>Frase Inesquecível</strong></label>
          <textarea class="form-control" id="frase" rows="4" placeholder="Digite a frase..."
            formControlName="frase"></textarea>
        </div>

        <div class="mb-3">
          <label class="form-label"><strong>Autor</strong></label>

          <select class="form-select mb-2" [value]="autorSelecionado" (change)="onAutorChange($event)">
            <option value="" disabled>Selecione um autor...</option>

            <option *ngFor="let autorNome of listaAutoresUnicos" [value]="autorNome">
              {{ autorNome }}
            </option>
            <option value="novo">-- Cadastre um novo Autor --</option>
          </select>

          <input *ngIf="mostrarInputAutor" type="text" class="form-control mt-2"
            placeholder="Digite o nome do autor aqui..." formControlName="autor" />
        </div>

        <div class="mb-3">
          <label for="livro" class="form-label"><strong>Nome do Livro</strong></label>
          
          <select class="form-select mb-2" [value]="livroSelecionado" (change)="onLivroChange($event)">
            <option value="" disabled>Selecione um livro...</option>

            <option *ngFor="let nomeLivro of listaLivrosUnicos" [value]="nomeLivro">
              {{ nomeLivro }}
            </option>
            <option value="novo">-- Digite o nome de um livro --</option>
          </select>

          <input *ngIf="mostrarInputLivro" type="text" class="form-control mt-2"
            placeholder="Digite o nome do livro aqui..." formControlName="nomeLivro" />
        </div>

        <div class="d-flex justify-content-end gap-2 mt-4">
          <a class="btn bg-primary btn-lg ms-2" href="/frases-inesqueciveis-dashboard" role="button">Voltar</a>
          <button type="button" class="btn bg-primary btn-lg ms-2" (click)="salvar()">Salvar</button>
        </div>

      </form>

    </div>
  </div>
</div>
